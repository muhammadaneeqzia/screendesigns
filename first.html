<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AutoFixia Premium Inspection Wizard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#4DA3FF; --primary-dark:#2F80ED; --primary-deep:#1467D8;
  --primary-light:#EAF4FF; --primary-soft:#F6FAFF; --glass:rgba(255,255,255,.72);
  --border:#BFDFFF; --border-soft:#DCEEFF; --shadow:rgba(77,163,255,.18);
  --good:#22C55E; --fair:#F59E0B; --poor:#EF4444; --text:#172033; --muted:#64748B; --white:#fff;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(circle at 10% 0%,#DFF0FF 0,#F8FBFF 32%,#EEF7FF 100%);min-height:100vh}
.app{max-width:1440px;margin:auto;padding:18px}.top{position:sticky;top:0;z-index:20;background:rgba(248,251,255,.78);backdrop-filter:blur(22px);padding:12px 0 16px;border-bottom:1px solid rgba(191,223,255,.55)}
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,#4DA3FF,#76BCFF 50%,#BFE3FF);border-radius:32px;padding:24px;color:white;box-shadow:0 24px 65px rgba(77,163,255,.26);display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;border:1px solid rgba(255,255,255,.48)}
.hero:before{content:"";position:absolute;inset:-80px -80px auto auto;width:330px;height:330px;background:rgba(255,255,255,.22);border-radius:50%;filter:blur(3px)}.hero:after{content:"";position:absolute;left:24px;right:24px;bottom:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent)}
.brand{display:flex;align-items:center;gap:14px;position:relative}.logo{width:56px;height:56px;border-radius:18px;background:rgba(255,255,255,.22);display:grid;place-items:center;font-size:28px;border:1px solid rgba(255,255,255,.48);box-shadow:inset 0 1px 0 rgba(255,255,255,.45)}
.hero h1{margin:0;font-size:30px;letter-spacing:-.8px;font-weight:900}.hero p{margin:7px 0 0;opacity:.93;font-weight:500}.health{position:relative;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.48);border-radius:26px;padding:16px 20px;text-align:center;min-width:180px;box-shadow:inset 0 1px 0 rgba(255,255,255,.45)}.health small{font-weight:700;opacity:.92}.health b{font-size:40px;letter-spacing:-1.5px}
.wizard{display:grid;grid-template-columns:326px 1fr;gap:18px;margin-top:18px}.side{background:var(--glass);backdrop-filter:blur(20px);border:1px solid rgba(191,223,255,.8);border-radius:30px;box-shadow:0 18px 55px var(--shadow);overflow:hidden;height:calc(100vh - 172px);position:sticky;top:156px}.search{padding:14px;border-bottom:1px solid #EAF4FF}.search input{width:100%;border:1px solid var(--border);border-radius:18px;padding:13px 15px;outline:0;color:var(--text);background:rgba(255,255,255,.82);box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}.cat-list{overflow:auto;height:calc(100% - 72px);padding:10px}.cat{position:relative;display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:18px;cursor:pointer;font-size:14px;font-weight:700;color:#334155;margin:4px 0;border:1px solid transparent;transition:.22s}.cat:hover{background:rgba(242,248,255,.9);transform:translateX(2px)}.cat.active{background:linear-gradient(135deg,#D9ECFF,#F6FBFF);border-color:#A7D3FF;color:#0F5CAB;box-shadow:0 12px 28px rgba(77,163,255,.16)}.cat.active:before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:5px;border-radius:0 10px 10px 0;background:linear-gradient(180deg,#4DA3FF,#2F80ED)}.cat.done .tick{background:#22C55E;color:#fff}.tick{width:28px;height:28px;border-radius:12px;display:grid;place-items:center;background:#EAF4FF;color:#2F80ED;font-size:13px;flex:none;border:1px solid #D3EAFF}.content{min-width:0}.stepbar{background:rgba(255,255,255,.78);backdrop-filter:blur(18px);border:1px solid rgba(191,223,255,.9);border-radius:30px;padding:18px;box-shadow:0 18px 55px rgba(77,163,255,.13);margin-bottom:16px}.step-title{display:flex;justify-content:space-between;gap:12px;align-items:center}.step-title h2{margin:0;font-size:24px;letter-spacing:-.5px}.step-title b{background:#EEF7FF;border:1px solid var(--border);color:#2F80ED;border-radius:999px;padding:9px 13px;font-size:13px}.progress{height:11px;background:#EAF4FF;border-radius:30px;overflow:hidden;margin-top:15px;box-shadow:inset 0 1px 3px rgba(47,128,237,.12)}.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,#9FD0FF,#4DA3FF,#2F80ED);border-radius:30px;transition:.35s;box-shadow:0 0 18px rgba(77,163,255,.55)}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{background:rgba(255,255,255,.82);border:1px solid rgba(191,223,255,.88);border-radius:24px;padding:16px;box-shadow:0 14px 36px rgba(77,163,255,.12);position:relative;overflow:hidden}.kpi:after{content:"";position:absolute;right:-26px;top:-26px;width:82px;height:82px;border-radius:50%;background:#EAF4FF}.kpi small{color:var(--muted);font-weight:700;position:relative}.kpi strong{display:block;font-size:28px;margin-top:5px;letter-spacing:-.8px;position:relative}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card{position:relative;background:linear-gradient(145deg,rgba(255,255,255,.95),rgba(248,251,255,.92));border:1px solid rgba(191,223,255,.95);border-radius:30px;box-shadow:0 18px 50px rgba(77,163,255,.14), inset 0 1px 0 rgba(255,255,255,.95);overflow:hidden;padding:18px;transition:.25s}.card:hover{transform:translateY(-3px);box-shadow:0 28px 70px rgba(77,163,255,.2)}.card:before{content:"";position:absolute;left:16px;right:16px;top:0;height:6px;border-radius:0 0 16px 16px;background:linear-gradient(90deg,#4DA3FF,#6FB8FF,#B8E0FF)}.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-top:5px}.point{display:flex;gap:12px;align-items:center}.icon{width:50px;height:50px;border-radius:18px;background:linear-gradient(135deg,#EAF4FF,#D9ECFF);display:grid;place-items:center;font-size:23px;border:1px solid #BFDFFF;box-shadow:inset 0 1px 0 white}.point h3{margin:0;font-size:16px;letter-spacing:-.25px}.point p{margin:5px 0 0;color:var(--muted);font-size:12px;font-weight:600}.score{background:linear-gradient(135deg,#4DA3FF,#2F80ED);color:white;border-radius:18px;padding:10px 12px;text-align:center;min-width:78px;box-shadow:0 12px 24px rgba(47,128,237,.24)}.score b{font-size:21px}.score small{display:block;font-size:10px;opacity:.9;font-weight:700}.slider-box{margin:18px 0 14px;padding:15px;background:linear-gradient(135deg,#F6FAFF,#EEF7FF);border:1px solid #DCEEFF;border-radius:22px}.slider-label{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;font-weight:800;margin-bottom:9px}.range{width:100%;accent-color:var(--primary)}.status-title{font-size:12px;color:var(--muted);font-weight:800;margin:8px 0 9px}.radios{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.radio{border:1px solid #DCEEFF;background:white;border-radius:16px;padding:11px;text-align:center;font-weight:800;cursor:pointer;font-size:13px;transition:.2s;box-shadow:0 6px 14px rgba(77,163,255,.06)}.radio:hover{transform:translateY(-1px)}.radio.good.active{background:#EAFBF3;border-color:var(--good);color:#148A45}.radio.fair.active{background:#FFF8EA;border-color:var(--fair);color:#B36B00}.radio.poor.active{background:#FFF0F0;border-color:var(--poor);color:#C73030}.actions{display:flex;gap:9px;margin-top:14px}.btn{border:0;border-radius:16px;padding:12px 13px;font-weight:800;cursor:pointer;transition:.2s}.btn:hover{transform:translateY(-1px)}.notes{background:#EEF7FF;border:1px solid var(--border);color:#2F80ED;flex:1}.photo{background:linear-gradient(135deg,#4DA3FF,#2F80ED);color:white;flex:1;box-shadow:0 10px 22px rgba(47,128,237,.2)}.note-area{display:none;margin-top:12px}.note-area textarea{width:100%;min-height:82px;border:1px solid var(--border);border-radius:18px;padding:12px;resize:vertical;outline:0;background:#fff}.photos-row{display:none;margin-top:12px;gap:8px;flex-wrap:wrap}.thumb{width:60px;height:60px;border-radius:16px;background:#EAF4FF;border:1px dashed #8BC8FF;display:grid;place-items:center;color:#2F80ED;font-weight:900}.nav{display:flex;justify-content:space-between;gap:12px;margin:18px 0}.nav button{padding:15px 22px;border-radius:18px;border:1px solid var(--border);background:rgba(255,255,255,.88);color:#2F80ED;font-weight:900;cursor:pointer;box-shadow:0 12px 30px rgba(77,163,255,.1)}.nav .next{background:linear-gradient(135deg,#4DA3FF,#2F80ED);color:white;border:0}
@media(max-width:960px){.wizard{grid-template-columns:1fr}.side{position:relative;top:auto;height:auto}.cat-list{display:flex;overflow:auto;height:auto}.cat{white-space:nowrap}.summary{grid-template-columns:repeat(2,1fr)}.cards{grid-template-columns:1fr}.hero{grid-template-columns:1fr}.health{width:100%}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="hero"><div class="brand"><div class="logo">✦</div><div><h1>AutoFixia Inspection Wizard</h1><p>Mercedes/Tesla inspired light-blue premium tablet experience for complete vehicle inspection.</p></div></div><div class="health"><small>Overall Health</small><br><b id="overall">88%</b></div></div></div>
  <div class="wizard">
    <aside class="side"><div class="search"><input id="search" placeholder="Search Category"></div><div class="cat-list" id="catList"></div></aside>
    <main class="content">
      <div class="stepbar"><div class="step-title"><h2 id="catTitle">Lubricants</h2><b id="stepCount">Step 1 of 15</b></div><div class="progress"><span id="progressFill"></span></div></div>
      <div class="summary"><div class="kpi"><small>Total Points</small><strong id="totalPts">0</strong></div><div class="kpi"><small>Good</small><strong id="goodPts">0</strong></div><div class="kpi"><small>Fair</small><strong id="fairPts">0</strong></div><div class="kpi"><small>Poor</small><strong id="poorPts">0</strong></div></div>
      <div id="cards" class="cards"></div>
      <div class="nav"><button onclick="prevCat()">← Previous Category</button><button class="next" onclick="nextCat()">Next Category →</button></div>
    </main>
  </div>
</div>
<script>
const categories=[
 {name:'Exterior Inspection', icon:'🚘', points:['Body Panels Condition','Paint Condition','Windshield Condition','Headlights Condition','Tail Lights Condition','Side Mirrors Condition']},
 {name:'Interior Inspection', icon:'💺', points:['Dashboard Condition','Seat Condition','AC Cooling','Interior Lights','Seat Belts','Infotainment System']},
 {name:'Engine Bay Inspection', icon:'🔧', points:['Engine Mount Condition','Belts Condition','Hoses Condition','Battery Condition','Air Filter Condition','Engine Noise']},
 {name:'Underbody Inspection', icon:'🛠', points:['Underbody Rust','Exhaust Condition','Suspension Bushes','Shock Absorbers','Mounting Bolts','Underbody Damage']},
 {name:'Brake System', icon:'🛑', points:['Brake Pad Condition','Brake Disc Condition','Brake Pedal Feel','ABS Warning','Hand Brake','Brake Noise']},
 {name:'Tyres And Wheels', icon:'🛞', points:['Front Tyre Condition','Rear Tyre Condition','Tyre Pressure','Wheel Alignment','Wheel Rims','Wheel Bearing']},
 {name:'Transmission And Drivetrain', icon:'⚙️', points:['Gear Shift Quality','Transmission Noise','Clutch Condition','Drive Shaft','CV Joint','Differential Noise']},
 {name:'Fluid Leaks', icon:'💧', points:['Engine Leak','Transmission Leak','Coolant Leak','Brake Fluid Leak','Power Steering Leak','Differential Leak']},
 {name:'Road Test Inspection', icon:'🛣', points:['Acceleration','Braking','Steering Response','Suspension Comfort','Noise During Drive','Warning Lights']},
 {name:'Safety And Compliance', icon:'🛡', points:['Airbags Warning','Horn','Wipers','Emergency Kit','Fire Extinguisher','Number Plate']},
 {name:'Vehicle Diagnostics', icon:'🖥', points:['OBD Scan','Fault Codes','ECU Status','Sensor Readings','Battery Voltage','Service Reset']},
 {name:'Additional Checks', icon:'➕', points:['Spare Tyre','Jack Tools','Remote Key','Owner Manual','Service History','Accessories']},
 {name:'EV Inspection', icon:'🔋', points:['Battery Health','Charging Port','High Voltage Cable','Motor Condition','Regenerative Braking','Charging Cable']},
 {name:'Chassis', icon:'🏗', points:['Chassis Condition','Frame Alignment','Accident Signs','Welding Marks','Rust Marks','Chassis Number']},
 {name:'Lubricants', icon:'🛢', points:['Engine Oil Condition','Engine Oil Leakage','Brake Fluid Leakage','Transmission Oil Leakage','Coolant Leakage','Differential Oil Level','Brake Fluid Level','Engine Oil Level','Power Steering Fluid Level','Transmission Fluid Level']}
];
let current=14; const state={}; categories.forEach(c=>c.points.forEach(p=>state[p]={score:85,status:'Good',notes:false,photos:0}));
function renderCats(){let q=document.getElementById('search').value.toLowerCase();catList.innerHTML='';categories.forEach((c,i)=>{if(!c.name.toLowerCase().includes(q))return;let d=document.createElement('div');d.className='cat '+(i===current?'active ':'')+(i<current?'done':'');d.onclick=()=>{current=i;render()};d.innerHTML=`<span class="tick">${i<current?'✓':c.icon}</span><span>${c.name}</span>`;catList.appendChild(d)})}
function render(){renderCats();let c=categories[current];catTitle.textContent=c.name;stepCount.textContent=`Step ${current+1} of ${categories.length}`;progressFill.style.width=((current+1)/categories.length*100)+'%';totalPts.textContent=c.points.length;let g=0,f=0,p=0;cards.innerHTML='';c.points.forEach(pt=>{let s=state[pt]; if(s.status==='Good')g++; if(s.status==='Fair')f++; if(s.status==='Poor')p++;let card=document.createElement('div');card.className='card';card.innerHTML=`<div class="card-head"><div class="point"><div class="icon">${c.icon}</div><div><h3>${pt}</h3><p>Inspect and record condition</p></div></div><div class="score"><b>${s.score}%</b><small>Score</small></div></div><div class="slider-box"><div class="slider-label"><span>Health Score</span><span>0% — 100%</span></div><input class="range" type="range" min="0" max="100" value="${s.score}" oninput="updateScore('${pt}',this.value)"></div><div class="status-title">Condition Status - separate from score slider</div><div class="radios"><div onclick="setStatus('${pt}','Poor')" class="radio poor ${s.status==='Poor'?'active':''}">Poor</div><div onclick="setStatus('${pt}','Fair')" class="radio fair ${s.status==='Fair'?'active':''}">Fair</div><div onclick="setStatus('${pt}','Good')" class="radio good ${s.status==='Good'?'active':''}">Good</div></div><div class="actions"><button class="btn notes" onclick="toggleNotes('${pt}')">💬 Notes</button><button class="btn photo" onclick="addPhoto('${pt}')">📷 Photos ${s.photos? '('+s.photos+')':''}</button></div><div class="note-area" style="display:${s.notes?'block':'none'}"><textarea placeholder="Add inspection comments for ${pt}..."></textarea></div><div class="photos-row" style="display:${s.photos?'flex':'none'}">${Array.from({length:s.photos},(_,i)=>`<div class="thumb">${i+1}</div>`).join('')}<div class="thumb">+</div></div>`;cards.appendChild(card)});goodPts.textContent=g;fairPts.textContent=f;poorPts.textContent=p;overall.textContent=Math.round(Object.values(state).reduce((a,b)=>a+b.score,0)/Object.values(state).length)+'%'}
function updateScore(p,v){state[p].score=+v;render()} function setStatus(p,v){state[p].status=v;render()} function toggleNotes(p){state[p].notes=!state[p].notes;render()} function addPhoto(p){state[p].photos=Math.min(5,state[p].photos+1);render()} function nextCat(){current=Math.min(categories.length-1,current+1);render()} function prevCat(){current=Math.max(0,current-1);render()} search.oninput=renderCats; render();
</script>
</body>
</html>
